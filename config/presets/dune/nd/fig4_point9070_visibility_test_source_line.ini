include = ../../../base/dune/nd_minimal_onaxis.ini

operation = dune_nd_fig4_source_line

[theory]
model = iss23
point_source = index
index_csv = data/inverse_seesaw/3p1/theory_points_index.csv
point_id = 9070

[beam]
mode = FHC
flux_model = table
flux_format = dune_globes_txt
flux_fhc_file = data/dune/flux/flux_dune_neutrino_ND_globes.txt
flux_rhc_file = data/dune/flux/flux_dune_antineutrino_ND_globes.txt
baseline_model = source_line
source_model = uniform
detector_distance_m = 574.0
decay_pipe_length_m = 194.0
source_z_bins = 80
source_debug = 1

[oscillation]
engine = exact_light
matter_enabled = 0

[interactions]
xsec_model = table
xsec_format = dune_globes
xsec_cc_file = data/dune/2103.04797v2/dune_globes/xsec/xsec_cc.dat
xsec_nc_file = data/dune/2103.04797v2/dune_globes/xsec/xsec_nc.dat

[samples]
axis = Erec
Erec_min_GeV = 0.5
Erec_max_GeV = 8.0
Erec_bins = 30

[output]
spectrum_pred_csv = data/dune_nd/minimal_onaxis/point_9070/plots_validation/fig4_nd_source_line_iss23_vs_active3nu_visibility_test.csv
point_observables_csv = data/dune_nd/minimal_onaxis/point_9070/point_observables.csv
