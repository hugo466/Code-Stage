include = ../../../base/dune/nd_minimal_onaxis.ini

operation = dune_nd_predict_spectrum

[theory]
model = iss23
point_source = index
index_csv = data/inverse_seesaw/3p1/theory_points_index.csv
point_id = 70

[beam]
mode = FHC
flux_model = table
flux_format = dune_globes_txt
flux_fhc_file = data/dune/flux/flux_dune_neutrino_ND_globes.txt
flux_rhc_file = data/dune/flux/flux_dune_antineutrino_ND_globes.txt
baseline_model = source_line
detector_distance_m = 574.0
decay_pipe_length_m = 194.0
source_z_bins = 80

[oscillation]
engine = exact_light
matter_enabled = 0

[interactions]
xsec_model = table
xsec_format = dune_globes
xsec_cc_file = data/dune/2103.04797v2/dune_globes/xsec/xsec_cc.dat
xsec_nc_file = data/dune/2103.04797v2/dune_globes/xsec/xsec_nc.dat

[detector]
detectors = ndlar

[detector.ndlar]
response_model = parametric
migration_model = gaussian
category_model = ndlar_minimal

[samples]
enabled = mu_like, e_like
axis = Erec
Erec_min_GeV = 0.5
Erec_max_GeV = 6.0
Erec_bins = 55

[output]
spectrum_pred_csv = data/dune_nd/minimal_onaxis/point_70/spectrum_pred.csv
spectrum_null_csv = data/dune_nd/minimal_onaxis/point_70/spectrum_null.csv
residuals_csv = data/dune_nd/minimal_onaxis/point_70/residuals.csv
point_observables_csv = data/dune_nd/minimal_onaxis/point_70/point_observables.csv
