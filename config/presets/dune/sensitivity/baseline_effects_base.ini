include = ../nd/minimal_onaxis.ini

operation = dune_baseline_effects_sensitivity

[samples]
Erec_bins = 60

[beam]
source_model = dk2nu
source_profile_z_fhc_file = data/dune/dk2nu/flux_z_FHC_ND_raw.csv
source_profile_z_rhc_file = data/dune/dk2nu/flux_z_RHC_ND_raw.csv

[sensitivity]
detector_mode = ND+FD
asimov_mode = standard3nu
test_backend = iss23_points
source_model = dk2nu
points_index_csv = data/inverse_seesaw/3p1/inverse_construct_23_kept_points/inverse_construct_23_kept_points.csv
nd_dk2nu_flux_z_fhc_file = data/dune/dk2nu/flux_z_FHC_ND_raw.csv
nd_dk2nu_flux_z_rhc_file = data/dune/dk2nu/flux_z_RHC_ND_raw.csv
fd_dk2nu_flux_z_fhc_file = data/dune/dk2nu/flux_z_FHC_FD_raw.csv
fd_dk2nu_flux_z_rhc_file = data/dune/dk2nu/flux_z_RHC_FD_raw.csv
shape_systematics_enabled = 0
priors_enabled = 1
minimizer_max_iter = 250
minimizer_tolerance = 1.0e-5
poisson_epsilon = 1.0e-12
